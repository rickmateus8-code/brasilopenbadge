services:
  docmaster:
    build: .
    container_name: docmaster-dev
    ports:
      - "5173:5173" # Frontend Vite
      - "8787:8787" # Cloudflare Worker
      - "8788:8788" # Cloudflare Pages Preview
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    # Rodar o dev local sem subir pro remote da Cloudflare por padrão
    command: npm run dev -- --remote=false
